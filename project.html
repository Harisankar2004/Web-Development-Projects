<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sample User Input Form</title>
  <style>
    :root{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;margin:0}
    body{padding:24px;background:#f6f8fa;color:#0b1220}
    .container{max-width:900px;margin:0 auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 6px 18px rgba(10,10,10,.06)}
    h1{font-size:1.4rem;margin-bottom:8px}
    form{display:grid;gap:12px}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    label{display:block;font-size:.9rem;margin-bottom:6px}
    input,textarea,select{padding:10px;border:1px solid #d6dbe0;border-radius:8px;width:100%;box-sizing:border-box}
    textarea{min-height:100px}
    .half{flex:1 1 220px}
    .controls{display:flex;gap:8px}
    button{padding:10px 14px;border-radius:8px;border:0;background:#0b79ff;color:#fff;cursor:pointer}
    button[type="reset"]{background:#66788a}
    .preview{background:#f3f6f9;padding:12px;border-radius:8px;border:1px dashed #d6dbe0}
    .small{font-size:.85rem;color:#445}
    .error{color:#d32f2f;font-weight:600}
  </style>
</head>
<body>
  <div class="container">
    <h1>Sample User Input Form</h1>
    <p class="small">A compact demo showing common form controls, basic validation, and a live JSON preview.</p>

    <form id="sampleForm" action="/submit" method="POST">
      <div class="row">
        <div class="half">
          <label for="fullName">Full name <span class="small">(required)</span></label>
          <input id="fullName" name="fullName" type="text" required minlength="2" placeholder="Jane Doe" />
        </div>
        <div class="half">
          <label for="email">Email <span class="small">(required)</span></label>
          <input id="email" name="email" type="email" required placeholder="jane@example.com" />
        </div>
      </div>
      <div class="half">
        <label for="dob">Date of birth</label>
        <input id="dob" name="dob" type="date" />
    </div>

      <div>
        <label>Gender</label>
        <div class="row">
          <label><input type="radio" name="gender" value="female"> Female</label>
          <label><input type="radio" name="gender" value="male"> Male</label>
          <label><input type="radio" name="gender" value="other"> Other</label>
        </div>
      </div>

      <div>
        <label>Interests</label>
        <div class="row">
          <label><input type="checkbox" name="interests" value="coding"> Coding</label>
          <label><input type="checkbox" name="interests" value="music"> Music</label>
          <label><input type="checkbox" name="interests" value="travel"> Travel</label>
        </div>
      </div>
      <div class="controls">
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
      </div>

    </form>

    <h2 style
